services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: omniagent
      POSTGRES_USER: omniagent
      POSTGRES_PASSWORD: omniagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniagent -d omniagent"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  omniagent:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://omniagent:omniagent@postgres:5432/omniagent}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8080}
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "8080:8080"
    user: root

volumes:
  postgres_data:
  qdrant_data:
